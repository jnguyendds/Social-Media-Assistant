<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Signal — Content Optimizer</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#14121C" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Signal" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" href="icon-192.png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap');
  :root{--ink:#14121C;--surface:#1E1A2B;--surface2:#26213A;--border:rgba(255,255,255,.09);
    --text:#F4F2FA;--muted:#948CAB;--ig:#F0308C;--tt:#25E0DE;--vio:#5B4BE0;--ok:#35D07F;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--ink);color:var(--text);font-family:'Inter',ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  body{min-height:100vh;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
  button{font-family:inherit;cursor:pointer;}
  .wrap{max-width:560px;margin:0 auto;padding:22px 18px 60px;}
  .vh{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);border:0;opacity:0;}
  header.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .brand{display:flex;align-items:baseline;gap:10px;}
  .brand .name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:28px;letter-spacing:-.5px;}
  .eq{display:inline-flex;gap:4px;align-items:flex-end;height:20px;}
  .eq span{width:3px;border-radius:2px;animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  .gear{background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);width:38px;height:38px;font-size:17px;}
  .sub{color:var(--muted);font-size:13.5px;margin:0 0 18px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:14px;}
  .drop{display:block;width:100%;border:1.5px dashed var(--border);background:transparent;color:var(--text);border-radius:14px;padding:34px 16px;text-align:center;cursor:pointer;}
  .drop b{font-size:15px;font-weight:600;}.drop small{color:var(--muted);font-size:12.5px;display:block;margin-top:6px;}
  .media{border-radius:12px;overflow:hidden;background:#000;margin-bottom:12px;display:flex;justify-content:center;max-height:300px;}
  .media img,.media video,.media canvas{max-height:300px;max-width:100%;object-fit:contain;}
  .row{display:flex;justify-content:space-between;align-items:center;}
  .kind{font-size:12.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .link{color:var(--muted);font-size:13px;text-decoration:underline;cursor:pointer;background:none;border:none;}
  .seg{display:flex;gap:8px;margin:14px 0;flex-wrap:wrap;}
  .seg button{flex:1;min-width:70px;padding:9px 6px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--muted);}
  .seg button.on-both{background:var(--vio);color:#fff;border-color:transparent;}
  .seg button.on-ig{background:var(--ig);color:#fff;border-color:transparent;}
  .seg button.on-tt{background:var(--tt);color:#08211F;border-color:transparent;}
  .cta{width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;color:#fff;background:linear-gradient(90deg,#F0308C,#5B4BE0 55%,#25E0DE);}
  .cta[disabled]{background:var(--surface2);color:var(--muted);}
  .btn2{width:100%;padding:12px;border-radius:11px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;font-weight:600;margin-top:8px;}
  .err{margin-top:12px;padding:10px 12px;border-radius:10px;background:rgba(255,77,109,.12);border:1px solid rgba(255,77,109,.3);color:#FFB3C1;font-size:13px;}
  .chip{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:5px 13px;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:14px;}
  .chip.ok{color:var(--ok);border-color:rgba(53,208,127,.4);}
  .pname{font-size:15px;font-weight:700;}
  .overall{display:flex;align-items:baseline;gap:5px;}
  .overall .big{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;line-height:1;}
  .overall .den{font-size:13px;color:var(--muted);}
  .meter{display:flex;gap:4px;align-items:flex-end;height:108px;margin-bottom:6px;}
  .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:transparent;border:none;padding:0;height:100%;justify-content:flex-end;}
  .bar .v{font-size:10.5px;font-weight:600;color:var(--muted);}
  .bar .track{width:100%;height:74px;display:flex;align-items:flex-end;border-radius:5px;overflow:hidden;background:rgba(255,255,255,.04);}
  .bar .fill{width:100%;}
  .bar .ab{font-size:9.5px;font-weight:600;color:#5B5470;letter-spacing:.3px;}
  .bar.active .ab{color:var(--accent);}.bar.active .fill{outline:2px solid var(--accent);outline-offset:-2px;}
  .cap{font-size:12.5px;color:var(--muted);min-height:18px;text-align:center;}.cap b{color:var(--text);}
  .sect-t{font-size:12.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  .fix{display:flex;gap:12px;padding:12px 0;border-top:1px solid var(--border);}.fix:first-child{border-top:none;}
  .fix .n{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;color:var(--ig);min-width:22px;}
  .fix .h{font-size:14.5px;font-weight:600;margin-bottom:3px;}.fix .w{font-size:13px;color:var(--muted);line-height:1.5;}
  .ideal{font-size:14px;line-height:1.6;color:#DDD8EC;margin:0;}
  .tagwrap{margin-bottom:12px;}.tagwrap .lab{font-size:12.5px;font-weight:700;}
  .copyall{background:transparent;border:1px solid var(--border);border-radius:8px;padding:4px 10px;color:var(--muted);font-size:12px;font-weight:600;}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .tag{background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:5px 11px;font-size:12.5px;color:#D6D0E8;}
  .capt{display:block;width:100%;text-align:left;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;color:var(--text);font-size:14px;line-height:1.5;}
  .capt small{display:block;margin-top:6px;font-size:11.5px;color:var(--muted);}
  .opts{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch;}
  .opt{flex:0 0 auto;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--muted);white-space:nowrap;}
  .opt.sel{background:var(--text);color:#14121C;border-color:transparent;}
  .steps{counter-reset:s;margin:0 0 12px;padding:0;list-style:none;}
  .steps li{position:relative;padding:6px 0 6px 30px;font-size:13.5px;line-height:1.5;color:#DDD8EC;}
  .steps li::before{counter-increment:s;content:counter(s);position:absolute;left:0;top:5px;width:20px;height:20px;border-radius:50%;background:var(--vio);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .instr{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px;font-size:13px;line-height:1.55;color:#CFC9E0;white-space:pre-wrap;max-height:150px;overflow:auto;margin-bottom:8px;}
  .note{font-size:12px;color:var(--muted);line-height:1.5;margin-top:10px;}
  .again{width:100%;margin-top:8px;padding:13px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:14.5px;font-weight:600;}
  .options-hero h2,.option-detail h2{font-family:'Space Grotesk',sans-serif;font-size:22px;margin:4px 0 6px;}
  .option-grid{display:grid;gap:10px;margin-bottom:14px;}
  .option-card{width:100%;text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px;color:var(--text);display:block;}
  .option-preview{display:block;border-radius:12px;overflow:hidden;background:var(--surface2);height:120px;margin-bottom:10px;color:var(--muted);font-size:12px;text-align:center;line-height:120px;}
  .option-preview img{width:100%;height:100%;object-fit:cover;display:block;}
  .option-preview.failed{color:#FFB3C1;border:1px solid rgba(255,77,109,.3);}
  .selected-preview{margin:14px 0;background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:10px;}
  .selected-preview img{display:block;width:100%;max-height:360px;object-fit:contain;border-radius:12px;background:#08060e;}
  .option-card.selected{border-color:var(--tt);box-shadow:0 0 0 1px rgba(37,224,222,.28);}
  .option-card-top,.option-meta{display:flex;justify-content:space-between;gap:8px;align-items:center;}
  .option-card-top b{font-size:16px;color:var(--text);}.option-card-top span:last-child,.score-pill{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--ok);}
  .option-desc{display:block;margin:8px 0;color:#DDD8EC;font-size:13.5px;line-height:1.45;}
  .option-meta{flex-wrap:wrap;color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.35px;}
  .option-split{display:grid;grid-template-columns:1fr;gap:12px;margin:14px 0;}
  .option-list{margin:0 0 12px;padding-left:18px;color:#DDD8EC;font-size:13px;line-height:1.5;}
  .sect-t span{font-weight:600;text-transform:none;letter-spacing:0;color:#6f6884;}
  details{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;}
  summary{color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;}
  .details-json{white-space:pre-wrap;overflow:auto;max-height:180px;color:#CFC9E0;background:var(--surface2);border-radius:10px;padding:10px;font-size:11px;}
  @media(min-width:620px){.option-split{grid-template-columns:1fr 1fr;}}
  .modal{position:fixed;inset:0;background:rgba(8,6,14,.75);display:none;align-items:center;justify-content:center;padding:20px;z-index:50;}
  .modal.show{display:flex;}
  .sheet{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:20px;max-width:440px;width:100%;}
  .sheet h2{font-family:'Space Grotesk',sans-serif;font-size:19px;margin:0 0 4px;}
  .sheet p{color:var(--muted);font-size:13px;line-height:1.5;margin:0 0 14px;}
  .sheet label{font-size:12.5px;font-weight:600;color:var(--muted);display:block;margin:12px 0 6px;}
  .sheet input,.sheet select{width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;font-family:inherit;}
  .sheet .save{margin-top:16px;width:100%;padding:13px;border-radius:11px;border:none;font-weight:700;font-size:14.5px;color:#fff;background:linear-gradient(90deg,#F0308C,#5B4BE0 55%,#25E0DE);}
  .sheet .cancel{width:100%;margin-top:8px;padding:11px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13.5px;}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand"><span class="name">SIGNAL</span>
      <span class="eq">
        <span style="height:10px;background:var(--ig);animation-delay:0s"></span>
        <span style="height:18px;background:var(--tt);animation-delay:.2s"></span>
        <span style="height:8px;background:var(--ig);animation-delay:.4s"></span>
        <span style="height:14px;background:var(--tt);animation-delay:.6s"></span>
      </span>
    </div>
    <button class="gear" id="gear" aria-label="Settings">⚙</button>
  </header>
  <p class="sub">Optimize, enhance, and clean up your content — before you post.</p>
  <main id="view"></main>
</div>

<input class="vh" id="file" type="file" accept="image/*,video/*" />
<input class="vh" id="cleanfile" type="file" accept="image/*" />
<input class="vh" id="editedvid" type="file" accept="video/*" />

<div class="modal" id="modal">
  <div class="sheet">
    <h2>Settings</h2>
    <p>Your Anthropic API key stays on this device and is sent only to Anthropic when you optimize. It is never uploaded anywhere else.</p>
    <label for="keyInput">Anthropic API key</label>
    <input id="keyInput" type="password" placeholder="sk-ant-…" autocomplete="off" autocapitalize="off" spellcheck="false" />
    <label for="modelSelect">Model</label>
    <select id="modelSelect"></select>
    <button class="save" id="saveSettings">Save</button>
    <button class="cancel" id="closeSettings">Close</button>
  </div>
</div>

<canvas id="work" class="vh"></canvas>
<script src="signal-contract.js"></script>
<script src="signal-preview-renderer.js"></script>
<script src="signal-options-ui.js"></script>
<script>
const MODELS=[["claude-sonnet-5","Sonnet 5 — balanced (recommended)"],["claude-opus-4-8","Opus 4.8 — deepest"],["claude-haiku-4-5-20251001","Haiku 4.5 — fastest & cheapest"]];
const DIMS=[["hook","Hook","HK"],["pacing","Pacing","PC",1],["completion","Completion","CP",1],["trendFit","Trend fit","TR"],["audio","Audio","AU",1],["textOverlay","Text overlay","TX"],["shareability","Shareability","SH"],["saveWorthiness","Save-worthy","SV"],["originality","Originality","OR"],["caption","Caption","CA"]];
const SYSTEM_PROMPT=`You are the analysis engine for a content advisor. Score a creator's photo or video against the 2026 Instagram/TikTok algorithm rubric, return fixes, an ideal-version rewrite, hashtags, captions, a subject focus point for cropping, and ready-to-paste AI cleanup instructions. Be specific to what is actually visible. Video is 3 sampled frames (early/middle/late).

RUBRIC (1-5): hook(first 2-3s scroll-stopper; IG high, TT critical); pacing(cuts/no dead air; video only); completion(payoff/loop for rewatch; video only); trendFit(current 2026 aesthetic); audio(trending/mixed; video only); textOverlay(upper-third synced captions); shareability(send-to-a-friend/relatable; IG critical TT high); saveWorthiness(useful/reference); originality(shot for platform, not templated); caption(adds hook/question).

HASHTAGS: instagram = up to 5 (1-2 niche 50K-500K, 1-2 topic 100K-1M, 0-1 branded; no mega-tags). tiktok = 5-9 via 3-3-3 (3 broad 10M+, 3 niche 100K-10M, 3 ultra-niche <100K); no #fyp/#foryou/#viral.

cropFocus: normalized {x,y} (0-1) of the CENTER of the main subject, so crops keep the subject centered.
cleanupInstructions: a ready-to-paste prompt for an AI image editor (like ChatGPT). Name the SPECIFIC distracting objects visible (poles, wires, clutter, background people/cars, reflections, signs) to remove, and explicitly say to keep the main subject completely unchanged (shape, color, position, its reflection), fill removed areas to match surroundings, keep the same aspect ratio, and output the full image. 2-5 sentences.

RULES: For a PHOTO set pacing/completion/audio to null and videoEdit to "". For a VIDEO, videoEdit = a ready-to-paste CapCut checklist: set aspect ratio for the platform, trim to the strongest 7-15s leading with the hook, a specific color direction, captions in the upper third, and add a trending sound of a NAMED genre that fits. If a platform isn't in focus set it null. Keep "why" and idealVersion tight. overall = avg of non-null scores, one decimal.

Return ONLY minified JSON, exactly:
{"category":"","contentType":"photo|video","cropFocus":{"x":0.5,"y":0.5},"instagram":{"overall":0,"scores":{"hook":0,"pacing":0,"completion":0,"trendFit":0,"audio":0,"textOverlay":0,"shareability":0,"saveWorthiness":0,"originality":0,"caption":0}},"tiktok":{"overall":0,"scores":{"hook":0,"pacing":0,"completion":0,"trendFit":0,"audio":0,"textOverlay":0,"shareability":0,"saveWorthiness":0,"originality":0,"caption":0}},"topFixes":[{"fix":"","why":""}],"idealVersion":"","hashtags":{"instagram":[],"tiktok":[]},"captions":["",""],"cleanupInstructions":"","videoEdit":""}`;

const S={apiKey:localStorage.getItem('signal_key')||'',model:localStorage.getItem('signal_model')||'claude-sonnet-5',
  file:null,kind:null,preview:null,img:null,focus:'both',status:'idle',error:'',result:null,selectedOptionId:null,
  dest:'ig-post',look:'enhanced',cleaned:false,copied:'',previews:{},previewMeta:{},showOriginal:false,sourceIdentity:''};
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const $=id=>document.getElementById(id);
const view=$('view'),fileInput=$('file'),cleanInput=$('cleanfile'),editedVid=$('editedvid');
function scoreColor(v){if(v==null)return'#3A3450';if(v<=1.5)return'#FF4D6D';if(v<=2.5)return'#FF8A5B';if(v<=3.5)return'#FFD166';if(v<=4.5)return'#9BE86B';return'#35D07F';}


/* ---------- image helpers ---------- */
function loadImg(src){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=()=>rej(new Error('Could not read that image.'));i.src=src;});}
function fitDim(w,h,max){const s=Math.min(1,max/Math.max(w,h));return[Math.round(w*s),Math.round(h*s),s];}
function imgToBase64(img,max){const[w,h]=fitDim(img.naturalWidth||img.width,img.naturalHeight||img.height,max);const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);return c.toDataURL('image/jpeg',.85).split(',')[1];}
function canvasToFile(c,name){return new Promise(res=>c.toBlob(b=>res(new File([b],name,{type:'image/jpeg'})),'image/jpeg',.9));}
async function shareCanvas(c,text){
  const f=await canvasToFile(c,'signal.jpg');
  try{if(text&&navigator.clipboard)await navigator.clipboard.writeText(text);}catch(e){}
  try{
    if(navigator.canShare&&navigator.canShare({files:[f]}))await navigator.share({files:[f],text});
    else{const a=document.createElement('a');a.href=URL.createObjectURL(f);a.download='signal.jpg';a.click();}
  }catch(e){}
}
async function shareFile(file,text){
  try{if(text&&navigator.clipboard)await navigator.clipboard.writeText(text);}catch(e){}
  try{
    if(file&&navigator.canShare&&navigator.canShare({files:[file]}))await navigator.share({files:[file],text});
    else if(navigator.share)await navigator.share({text});
    else{const a=document.createElement('a');a.href=URL.createObjectURL(file);a.download=file.name||'video.mp4';a.click();}
  }catch(e){}
}

/* ---------- media reading for analysis ---------- */
function drawToB64(drawable,w,h){const max=768;let tw=w,th=h;if(Math.max(w,h)>max){const s=max/Math.max(w,h);tw=(w*s)|0;th=(h*s)|0;}const c=document.createElement('canvas');c.width=tw;c.height=th;c.getContext('2d').drawImage(drawable,0,0,tw,th);return c.toDataURL('image/jpeg',.72).split(',')[1];}
function videoToFrames(file){return new Promise((res,rej)=>{const url=URL.createObjectURL(file),v=document.createElement('video');v.src=url;v.muted=true;v.playsInline=true;v.preload='auto';v.setAttribute('webkit-playsinline','true');const done=()=>URL.revokeObjectURL(url);v.onerror=()=>{done();rej(new Error("Couldn't read that video."));};v.onloadedmetadata=async()=>{const dur=(v.duration&&isFinite(v.duration))?v.duration:0;if(!dur){done();rej(new Error("Couldn't read video length."));return;}try{await v.play();v.pause();}catch(e){}const ts=[.1,.5,.9].map(p=>Math.min(Math.max(dur*p,.05),dur-.05));const fr=[];for(const t of ts){await new Promise(r=>{let g=0;const on=()=>{if(g)return;g=1;v.removeEventListener('seeked',on);try{fr.push(drawToB64(v,v.videoWidth||720,v.videoHeight||1280));}catch(e){}r();};v.addEventListener('seeked',on);setTimeout(()=>{if(!g){g=1;v.removeEventListener('seeked',on);r();}},2500);v.currentTime=t;});}done();fr.length?res(fr):rej(new Error("Couldn't pull frames from this clip."));};});}

/* ---------- analyze ---------- */
async function analyze(){
  if(!S.img&&S.kind!=='video')return; if(!S.apiKey){openSettings();return;}
  S.status='reading';S.error='';render();
  try{
    let images = S.kind==='video' ? await videoToFrames(S.file) : [imgToBase64(S.img,1024)];
    S.status='analyzing';render();
    const content=images.map(data=>({type:'image',source:{type:'base64',media_type:'image/jpeg',data}}));
    content.push({type:'text',text:`Content type: ${S.kind}. ${S.kind==='video'?'3 frames at ~10/50/90%.':''} Platform focus: ${S.focus}.${S.cleaned?' This image was already AI-cleaned; do not ask to remove more unless clearly needed.':''} Return the JSON.`});
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'content-type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:S.model,max_tokens:2000,system:SYSTEM_PROMPT,messages:[{role:'user',content}]})});
    if(r.status===401)throw new Error('That API key was rejected. Open settings and check it.');
    if(!r.ok){let m='';try{m=(await r.json()).error?.message||'';}catch(e){}throw new Error(`Optimizer error (${r.status}). ${m}`);}
    const data=await r.json();
    const raw=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    S.status='preparing';render();
    S.result=SignalContract.parseValidateNormalizeOptimizationResult(raw);S.selectedOptionId=(S.result.options&&S.result.options[0]&&S.result.options[0].id)||null;S.status='finalizing';render();await prepareOptionPreviews();
    S.status='done';S.dest='ig-post';S.look='enhanced';render();
  }catch(e){S.error=e.message.includes('Failed to fetch')?"Couldn't reach Anthropic. Check your connection.":(e.message&&e.message.includes('unexpected result')?"Signal couldn't confidently generate optimization options. Please retry with the same upload.":(e.message||'Something went wrong.'));S.status='error';render();}
}

/* ---------- rendering ---------- */
function meterBars(data,accent,idx){return DIMS.map(d=>{const v=data.scores?data.scores[d[0]]:null;const h=v==null?6:(v/5)*100;return `<button class="bar" data-panel="${idx}" data-k="${d[0]}" data-label="${esc(d[1])}" data-v="${v==null?'':v}" style="--accent:${accent}"><span class="v" style="${v==null?'color:#4A4460':''}">${v==null?'—':v}</span><span class="track"><span class="fill" style="height:${h}%;background:${scoreColor(v)}"></span></span><span class="ab">${d[2]}</span></button>`;}).join('');}
function panel(name,accent,data,idx){return `<div class="card"><div class="row" style="align-items:flex-end;margin-bottom:16px"><span class="pname" style="color:${accent}">${name}</span><span class="overall"><span class="big">${data.overall!=null?Number(data.overall).toFixed(1):'—'}</span><span class="den">/ 5</span></span></div><div class="meter" data-meter="${idx}">${meterBars(data,accent,idx)}</div><div class="cap" id="cap-${idx}">Tap a bar for its dimension</div></div>`;}
function tagRow(label,accent,tags){return `<div class="tagwrap"><div class="row"><span class="lab" style="color:${accent}">${label}</span><button class="copyall" data-copy="${esc(tags.join(' '))}">Copy all</button></div><div class="tags">${tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div></div>`;}

function uploadView(){
  const busy=['reading','analyzing','preparing','finalizing'].includes(S.status);
  const t=busy?SignalOptionsUI.progressLabel(S.status):'Optimize';
  const prev=!S.file?'':(S.kind==='video'?`<div class="media"><video src="${S.preview}" controls playsinline muted></video></div>`:`<div class="media"><img src="${S.preview}"></div>`);
  const chooser=!S.file?`<label class="drop" for="file"><b>Add a photo or video</b><small>Tap to choose from your camera roll</small></label>`:`${prev}<div class="row" style="margin-bottom:14px"><span class="kind">${S.kind}</span><label class="link" for="file">Change</label></div>`;
  return `<div class="card">${chooser}<div class="seg"><button data-focus="both" class="${S.focus==='both'?'on-both':''}">Both</button><button data-focus="instagram" class="${S.focus==='instagram'?'on-ig':''}">Instagram</button><button data-focus="tiktok" class="${S.focus==='tiktok'?'on-tt':''}">TikTok</button></div><button class="cta" id="optimize" ${(!S.file||busy)?'disabled':''}>${t}</button>${S.status==='error'?`<div class="err">${esc(S.error)}</div>`:''}</div>`;
}

function videoCard(){
  if(S.kind!=='video'||S.cleaned||!S.result)return '';
  const option=SignalOptionsUI.selectedOption(S.result,S.selectedOptionId);
  const plan=SignalOptionsUI.videoInstructions(option);
  const spec=S.focus==='instagram'?'4:5 (1080×1350) for feed, or 9:16 (1080×1920) for Reels'
    :S.focus==='tiktok'?'9:16 (1080×1920)'
    :'9:16 (1080×1920) for Reels/TikTok · 4:5 (1080×1350) for the feed';
  return `<div class="card"><div class="sect-t">Finish the video — free, via CapCut</div>
    <p style="font-size:13px;color:var(--muted);line-height:1.5;margin:0 0 10px">Signal can't re-encode video in the browser, so it hands your clip to CapCut (free) with an exact checklist. Edit there, then post.</p>
    <div style="font-size:13px;color:#DDD8EC;line-height:1.5;margin-bottom:10px"><b>Aspect ratio:</b> ${esc(spec)}</div>
    ${plan?`<div class="instr" id="vplan">${esc(plan)}</div><button class="btn2" data-copy="${esc(plan)}" style="margin-top:0">Copy checklist</button>`:''}
    <ol class="steps">
      <li>Tap <b>Send to CapCut</b> and open the clip in CapCut.</li>
      <li>Tap <b>Copy checklist</b> and follow it — aspect ratio, trim, color, captions, sound.</li>
      <li>Export from CapCut and save to your camera roll.</li>
      <li>Post it — or tap <b>Load edited video</b> to re-check here.</li>
    </ol>
    <button class="btn2" id="sendCapcut">Send to CapCut ↗</button>
    <label class="cta" for="editedvid" style="display:block;text-align:center;margin-top:8px">Load edited video ↩</label>
  </div>`;
}

function cleanupCard(){
  const option=SignalOptionsUI.selectedOption(S.result,S.selectedOptionId);
  const prompt=option&&option.handoff&&option.handoff.prompt;
  if(S.cleaned||S.kind==='video'||!prompt)return '';
  const ins=prompt;
  return `<div class="card"><div class="sect-t">AI cleanup — free, via ChatGPT</div>
    <p style="font-size:13px;color:var(--muted);line-height:1.5;margin:0 0 12px">Signal wrote exact instructions to erase the distractions. Send the image + these words to your own ChatGPT, then bring the cleaned photo back to finalize.</p>
    <ol class="steps">
      <li>Tap <b>Send image to clean</b> and save/share it to ChatGPT.</li>
      <li>Tap <b>Copy instructions</b>.</li>
      <li>In ChatGPT: attach the image, paste, send.</li>
      <li>Save ChatGPT's result to your camera roll.</li>
      <li>Tap <b>Load cleaned image</b> below to finalize here.</li>
    </ol>
    <div class="instr" id="instrBox">${esc(ins)}</div>
    <button class="btn2" data-copy="${esc(ins)}" style="margin-top:0">Copy instructions</button>
    <button class="btn2" id="sendClean">Send image to clean ↗</button>
    <label class="cta" for="cleanfile" style="display:block;text-align:center;margin-top:8px">Load cleaned image ↩</label>
  </div>`;
}

function resultsView(){
  const selectedPreview=S.previews&&S.selectedOptionId?S.previews[S.selectedOptionId]:null;
  let h=SignalOptionsUI.render(S.result,{selectedOptionId:S.selectedOptionId,kind:S.kind,cleaned:S.cleaned,focus:S.focus,previews:S.previews,selectedPreview,showOriginal:S.showOriginal,originalSource:S.preview});
  
  h+=`<button class="again" id="again">Start over with new content</button>`;
  return h;
}

async function prepareOptionPreviews(){
  if(!S.result||S.kind==='video'||!S.img)return;
  const focus=SignalContract.getCropFocus(S.result);
  const source={src:S.preview,id:S.sourceIdentity,naturalWidth:S.img.naturalWidth,naturalHeight:S.img.naturalHeight};
  await Promise.all((S.result.options||[]).map(async option=>{try{const r=await SignalPreviewRenderer.renderPreview({originalSource:source,option,outputDimensions:option.output,cropFocus:focus,localAdjustments:option.localAdjustments});S.previews[option.id]={rendered:r.rendered,cacheHit:r.cacheHit};S.previewMeta[option.id]=r;}catch(e){S.previews[option.id]={error:'Preview unavailable'};}}));
}
function selectedPreviewCanvas(){return SignalPreviewRenderer.renderPreview({originalSource:{src:S.preview,id:S.sourceIdentity,naturalWidth:S.img.naturalWidth,naturalHeight:S.img.naturalHeight},option:SignalOptionsUI.selectedOption(S.result,S.selectedOptionId),outputDimensions:SignalOptionsUI.selectedOption(S.result,S.selectedOptionId).output,cropFocus:SignalContract.getCropFocus(S.result),localAdjustments:SignalOptionsUI.selectedOption(S.result,S.selectedOptionId).localAdjustments});}
function render(){
  view.innerHTML=(S.result&&S.status==='done')?resultsView():uploadView();
}

/* ---------- events ---------- */
fileInput.addEventListener('click',e=>{e.currentTarget.value='';});
fileInput.addEventListener('change',async e=>{const f=e.target.files&&e.target.files[0];if(!f)return;const isV=f.type.startsWith('video')||/\.(mp4|mov|m4v|webm)$/i.test(f.name);const isI=f.type.startsWith('image')||/\.(jpe?g|png|heic|heif|webp)$/i.test(f.name);if(!isV&&!isI){S.error="That file type isn't supported.";S.status='error';render();return;}if(S.preview)URL.revokeObjectURL(S.preview);S.file=f;S.kind=isV?'video':'photo';S.preview=URL.createObjectURL(f);S.result=null;S.selectedOptionId=null;S.cleaned=false;S.previews={};S.previewMeta={};S.showOriginal=false;S.sourceIdentity=f.name+':'+f.size+':'+f.lastModified;SignalPreviewRenderer.setSourceIdentity(S.sourceIdentity);S.error='';S.status='idle';S.img=null;if(!isV){try{S.img=await loadImg(S.preview);}catch(err){}}render();});

// reload the AI-cleaned image and re-run
cleanInput.addEventListener('click',e=>{e.currentTarget.value='';});
cleanInput.addEventListener('change',async e=>{const f=e.target.files&&e.target.files[0];if(!f)return;try{const url=URL.createObjectURL(f);const img=await loadImg(url);S.img=img;S.file=f;S.kind='photo';S.preview=url;S.cleaned=true;S.dest='ig-post';S.look='enhanced';S.previews={};S.previewMeta={};S.sourceIdentity=f.name+':'+f.size+':'+f.lastModified;SignalPreviewRenderer.setSourceIdentity(S.sourceIdentity);await prepareOptionPreviews();S.status='done';render();window.scrollTo(0,0);}catch(err){S.error='Could not read the cleaned image. Make sure it saved to your photos.';render();}});

editedVid.addEventListener('click',e=>{e.currentTarget.value='';});
editedVid.addEventListener('change',async e=>{const f=e.target.files&&e.target.files[0];if(!f)return;if(S.preview)URL.revokeObjectURL(S.preview);S.file=f;S.kind='video';S.img=null;S.preview=URL.createObjectURL(f);S.cleaned=true;window.scrollTo(0,0);analyze();});

view.addEventListener('click',async e=>{
  const ob=e.target.closest('[data-option-id]');if(ob){S.selectedOptionId=ob.getAttribute('data-option-id');S.showOriginal=false;render();return;}
  const fb=e.target.closest('[data-focus]');if(fb){S.focus=fb.getAttribute('data-focus');render();return;}
  if(e.target.closest('#optimize')){analyze();return;}
  if(e.target.closest('#rescore')){analyze();return;}
  if(e.target.closest('#again')){if(S.preview)URL.revokeObjectURL(S.preview);S.file=null;S.preview=null;S.kind=null;S.img=null;S.result=null;S.selectedOptionId=null;S.cleaned=false;S.previews={};S.previewMeta={};S.showOriginal=false;S.sourceIdentity='';SignalPreviewRenderer.clearCache();S.status='idle';S.error='';render();return;}
  const dd=e.target.closest('[data-dest]');if(dd){S.dest=dd.getAttribute('data-dest');render();return;}
  const ll=e.target.closest('[data-look]');if(ll){S.look=ll.getAttribute('data-look');render();return;}
  if(e.target.closest('#shareEnh')){const r=await selectedPreviewCanvas();if(r&&r.canvas)shareCanvas(r.canvas,'');return;}
  if(e.target.closest('#toggleOriginal')){S.showOriginal=!S.showOriginal;render();return;}
  if(e.target.closest('#sendClean')){shareFile(S.file,'');return;}
  if(e.target.closest('#sendCapcut')){shareFile(S.file,SignalOptionsUI.videoInstructions(SignalOptionsUI.selectedOption(S.result,S.selectedOptionId)));return;}
  const cp=e.target.closest('[data-copy]');if(cp){const txt=cp.getAttribute('data-copy');const flash=()=>{const s=cp.querySelector('small');if(s){const o=s.textContent;s.textContent='Copied';setTimeout(()=>s.textContent=o,1300);}else{const o=cp.textContent;cp.textContent='Copied';setTimeout(()=>cp.textContent=o,1300);}};if(navigator.clipboard?.writeText)navigator.clipboard.writeText(txt).then(flash).catch(flash);else flash();return;}
  const bar=e.target.closest('.bar');if(bar){const idx=bar.getAttribute('data-panel');document.querySelectorAll(`.meter[data-meter="${idx}"] .bar`).forEach(b=>b.classList.remove('active'));bar.classList.add('active');const cap=$('cap-'+idx),v=bar.getAttribute('data-v');if(cap)cap.innerHTML=`<b>${esc(bar.getAttribute('data-label'))}</b> — ${v===''?'n/a for this format':esc(v)+'/5'}`;}
});

/* ---------- settings ---------- */
function fillModels(){const sel=$('modelSelect');sel.innerHTML='';MODELS.forEach(([v,l])=>{const o=document.createElement('option');o.value=v;o.textContent=l;if(v===S.model)o.selected=true;sel.appendChild(o);});}
function openSettings(){$('keyInput').value=S.apiKey;fillModels();$('modal').classList.add('show');}
function closeSettings(){$('modal').classList.remove('show');}
$('gear').addEventListener('click',openSettings);
$('closeSettings').addEventListener('click',closeSettings);
$('saveSettings').addEventListener('click',()=>{S.apiKey=$('keyInput').value.trim();S.model=$('modelSelect').value;localStorage.setItem('signal_key',S.apiKey);localStorage.setItem('signal_model',S.model);closeSettings();});

render();
if(!S.apiKey)openSettings();
</script>
</body>
</html>
